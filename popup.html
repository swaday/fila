<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="css/popup.css">

    <script src="https://kit.fontawesome.com/d19fdaba43.js" crossorigin="anonymous"></script>
    <title>Layout Popup Window</title>
</head>
<body>
<div>
    <div class="modal">
        <section class="image_section">
            <img src="image/banner_half_2.webp" alt="#">
        </section>

        <section class="form_section">
            <form action="#">
                <div class="select_container">
                    <div>
                        <input type="checkbox" id="select_all">
                        <label for="select_all">전체선택</label>
                    </div>

                    <button type="button" class="close_btn">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="product_container">
                    <ul>
                        <li>
                            <div class="product_item">
                                <input type="checkbox" id="product1">
                                <label for="product1">
                                    <img src="/image/item1.webp" alt="에샤페 벨크로 메리제인 초코">
                                    <b>에샤페 벨크로 메리제인 초코</b>
                                    <span>BROWN,BROWN,BROWN</span>
                                    <strong>99,900원</strong>
                                </label>
                            </div>
                            <div class="product_size" role="button">
                                <span>사이즈 선택</span>
                                <i class="fa-solid fa-angle-down"></i>
                            </div>
                        </li>
                        <li>
                            <div class="product_item">
                                <input type="checkbox" id="product2">
                                <label for="product2">
                                    <img src="/image/item2.webp" alt="에샤페 벨크로 메리제인 초코">
                                    <b>에샤페 실버문</b>
                                    <span>Grey, White, White</span>
                                    <strong>109,000원</strong>
                                </label>
                            </div>
                            <div class="product_size" role="button">
                                <span>사이즈 선택</span>
                                <i class="fa-solid fa-angle-down"></i>
                            </div>
                        </li>
                        <li>
                            <div class="product_item">
                                <input type="checkbox" id="product3">
                                <label for="product3">
                                    <img src="image/item3.webp" alt="에샤페 벨크로 메리제인 초코">
                                    <b>에샤페 LX 크림</b>
                                    <span>WHITE,BROWN,WHITE</span>
                                    <strong>119,000원</strong>
                                </label>
                            </div>
                            <div class="product_size" role="button">
                                <span>사이즈 선택</span>
                                <i class="fa-solid fa-angle-down"></i>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="total_price_container">
                    <b>주문금액</b>
                    <b>1,000,000원</b>
                </div>

                <div class="submit_container">
                    <button type="submit">장바구니 담기</button>
                </div>
            </form>
        </section>
    </div>
</div>







</body>
</html>
